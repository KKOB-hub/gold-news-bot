name: Daily Gold News

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 06:00 Thailand (UTC+7)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-gold-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip uninstall -y google-generativeai || true && pip install google-genai requests

      - name: Run Gold News Bot
        run: python gold_news.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit news files to repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add GoldNews.txt GoldNewsMT5.txt
          git diff --staged --quiet || git commit -m "Update gold news $(date +%Y-%m-%d)"
          git push
